<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1B92C6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stock Clínicas">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Stock Clínicas · Dentalsaúde</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
/* ============================================================
   CONFIGURAÇÃO  →  preenche os 3 valores marcados abaixo
   ============================================================ */
</style>
<style>
:root{
  --bg:#EFF5F9; --card:#FFFFFF; --ink:#33373A; --muted:#7A8488;
  --line:#E4EBEF; --primary:#1B92C6; --primary-d:#127099;
  --blue:#40B4E5; --grey:#545759;
  --ok:#2F9E44; --amber:#C8890A; --red:#D64545;
  --amber-bg:#FBF1DA; --red-bg:#FBE3E3; --ok-bg:#E5F4E9;
  --shadow:0 1px 2px rgba(20,40,55,.04),0 8px 24px rgba(20,60,90,.07);
  --radius:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  font-size:16px;line-height:1.45;
  padding-bottom:env(safe-area-inset-bottom);
}
h1,h2,h3{margin:0;font-weight:600}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit;font-size:16px}
.hidden{display:none!important}

/* ---------- Splash / seletor de perfil ---------- */
#login{
  position:fixed;inset:0;background:
    radial-gradient(130% 80% at 50% -5%, #FFFFFF 0%, #EAF5FB 55%, #DCEEF7 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;color:var(--ink);z-index:50;
}
#login .brand{text-align:center;margin-bottom:30px;animation:rise .6s ease both}
#login .brand .logo{width:min(72vw,300px);height:auto;display:block;margin:0 auto}
#login .brand p{margin:14px 0 0;color:var(--muted);font-size:12.5px;letter-spacing:2px;text-transform:uppercase;font-weight:600}
.profiles{display:flex;flex-direction:column;gap:12px;width:100%;max-width:360px}
.pcard{
  background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:16px 18px;color:var(--ink);
  display:flex;align-items:center;gap:14px;text-align:left;transition:.18s;
  box-shadow:var(--shadow);animation:rise .6s ease both;
}
.pcard:nth-child(2){animation-delay:.07s}.pcard:nth-child(3){animation-delay:.14s}
.pcard:active{transform:scale(.98);border-color:var(--blue)}
.pcard .dot{width:38px;height:38px;border-radius:10px;flex:none;display:grid;place-items:center;font-weight:700;background:var(--blue);color:#fff}
.pcard b{font-size:17px;font-weight:600}.pcard small{display:block;color:var(--muted);font-weight:400}
.pin{width:100%;max-width:360px;margin-top:20px;animation:rise .3s ease both}
.pin input{
  width:100%;padding:15px;border-radius:12px;border:1px solid var(--line);text-align:center;
  font-size:24px;letter-spacing:8px;font-weight:600;color:var(--ink);background:#fff;
}
.pin .row{display:flex;gap:10px;margin-top:12px}
.pin button{flex:1;padding:14px;border-radius:12px;font-size:16px;font-weight:600}
.pin .ok{background:var(--primary);color:#fff}
.pin .back{background:#E9EEF1;color:var(--ink)}
.pin .err{min-height:18px;text-align:center;margin-top:10px;font-size:13px;color:var(--red)}

/* ---------- Topbar ---------- */
header.top{
  position:sticky;top:0;z-index:20;background:var(--primary);color:#fff;
  padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;row-gap:8px;box-shadow:0 2px 12px rgba(10,60,58,.18);
}
header.top .title{flex:1;min-width:0}
header.top .title b{font-family:'Fraunces',serif;font-size:18px;display:block;line-height:1.1}
header.top .title small{opacity:.85;font-size:12.5px}
.cl-switch{display:flex;flex:0 0 auto;margin-left:auto;background:rgba(255,255,255,.16);border-radius:10px;padding:3px;gap:2px}
.cl-switch button{color:#fff;padding:6px 11px;border-radius:8px;font-size:13px;font-weight:600;opacity:.7}
.cl-switch button.on{background:#fff;color:var(--primary-d);opacity:1}
.iconbtn{flex:0 0 auto;width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.16);color:#fff;display:grid;place-items:center;font-size:18px}

/* ---------- Toolbar ---------- */
.toolbar{padding:12px 16px 4px;display:flex;flex-direction:column;gap:10px}
.search{position:relative}
.search input{width:100%;padding:12px 14px 12px 40px;border-radius:12px;border:1px solid var(--line);background:#fff}
.search::before{content:"🔍";position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.5;font-size:14px}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.chip{flex:none;padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:13.5px;font-weight:500;color:var(--muted)}
.chip.on{background:var(--primary);border-color:var(--primary);color:#fff}

/* ---------- Lista ---------- */
main{padding:6px 16px 90px}
.summary{display:flex;gap:10px;margin:8px 0 14px}
.stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow)}
.stat b{font-size:22px;display:block;font-weight:700}
.stat small{color:var(--muted);font-size:12px}
.stat.alert b{color:var(--red)}
.item{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px;margin-bottom:10px;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:12px;transition:.15s;
}
.item:active{transform:scale(.992)}
.item .qty{flex:none;width:60px;text-align:center}
.item .qty b{font-size:24px;font-weight:700;line-height:1}
.item .qty small{color:var(--muted);font-size:11px}
.item .info{flex:1;min-width:0}
.item .info b{font-size:15.5px;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .info small{color:var(--muted);font-size:12.5px}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;display:inline-block;margin-top:3px}
.badge.red{background:var(--red-bg);color:var(--red)}
.badge.amber{background:var(--amber-bg);color:var(--amber)}
.badge.ok{background:var(--ok-bg);color:var(--ok)}
.item .step{display:flex;flex-direction:column;gap:6px}
.item .step button{width:34px;height:30px;border-radius:9px;font-size:18px;font-weight:700;display:grid;place-items:center}
.item .step .plus{background:var(--ok-bg);color:var(--ok)}
.item .step .minus{background:var(--red-bg);color:var(--red)}
.empty{text-align:center;color:var(--muted);padding:50px 20px}
.empty .big{font-size:38px;margin-bottom:8px}

/* ---------- FAB ---------- */
.fabwrap{position:fixed;right:18px;bottom:calc(18px + env(safe-area-inset-bottom));z-index:25;display:flex;flex-direction:column;align-items:flex-end;gap:12px}
.fab{
  height:56px;padding:0 22px;border-radius:18px;background:var(--primary);color:#fff;
  font-size:16px;font-weight:600;box-shadow:0 8px 24px rgba(20,60,90,.32);
  display:flex;align-items:center;gap:8px;
}
.fab.scan{width:52px;height:52px;padding:0;justify-content:center;font-size:22px;background:var(--grey)}
.fab:active{transform:scale(.96)}

/* ---------- Menu de ferramentas ---------- */
.toolitem{display:flex;align-items:center;gap:14px;width:100%;padding:15px 16px;border-radius:13px;background:var(--bg);margin-bottom:10px;text-align:left;font-size:15.5px;font-weight:600;color:var(--ink)}
.toolitem .ic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;font-size:20px;background:#fff;flex:none}
.toolitem small{display:block;font-weight:400;color:var(--muted);font-size:12.5px}
#reader{width:100%;border-radius:14px;overflow:hidden;margin:6px 0 12px;background:#000;min-height:60px}
.cprov{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow)}
.cprov h3{font-size:14px;color:var(--primary-d);margin-bottom:8px}
.cprov .ci{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);font-size:14px}
.cprov .ci:last-child{border-bottom:none}
.cprov .ci b{font-weight:600}.cprov .ci .q{color:var(--red);font-weight:600;white-space:nowrap}

/* ---------- Modal / sheet ---------- */
.sheet-bg{position:fixed;inset:0;background:rgba(16,33,31,.42);z-index:40;display:flex;align-items:flex-end;justify-content:center}
.sheet{
  background:var(--card);width:100%;max-width:520px;border-radius:22px 22px 0 0;
  padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:90vh;overflow:auto;
  animation:up .25s ease both;
}
@media(min-width:560px){.sheet-bg{align-items:center}.sheet{border-radius:22px;animation:rise .2s ease both}}
.sheet h2{font-family:'Fraunces',serif;font-size:21px;margin-bottom:4px}
.sheet .sub{color:var(--muted);font-size:13.5px;margin-bottom:16px}
.field{margin-bottom:13px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:5px}
.field input,.field select{width:100%;padding:12px 13px;border-radius:11px;border:1px solid var(--line);background:#fff}
.field .hint{font-size:12px;color:var(--amber);margin-top:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.btnrow{display:flex;gap:10px;margin-top:8px}
.btn{flex:1;padding:14px;border-radius:13px;font-size:15.5px;font-weight:600;text-align:center}
.btn.primary{background:var(--primary);color:#fff}
.btn.ghost{background:var(--bg);color:var(--ink)}
.btn.danger{background:var(--red-bg);color:var(--red)}
.btn.sm{flex:none;padding:8px 14px;font-size:13px;border-radius:10px}
.seg{display:flex;gap:8px;margin-bottom:14px}
.seg button{flex:1;padding:11px;border-radius:11px;border:1px solid var(--line);background:#fff;font-weight:600;color:var(--muted)}
.seg button.on.plus{background:var(--ok);border-color:var(--ok);color:#fff}
.seg button.on.minus{background:var(--red);border-color:var(--red);color:#fff}
.seg button.on.adj{background:var(--primary);border-color:var(--primary);color:#fff}
.bignum{display:flex;align-items:center;gap:12px;justify-content:center;margin:10px 0 16px}
.bignum button{width:52px;height:52px;border-radius:14px;background:var(--bg);font-size:26px;font-weight:700}
.bignum input{width:100px;text-align:center;font-size:34px;font-weight:700;border:none;border-bottom:2px solid var(--line);padding:4px}

/* ---------- Comparativo (admin) ---------- */
.cmp{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:9px;box-shadow:var(--shadow)}
.cmp .nm{font-weight:600;font-size:14.5px;margin-bottom:8px}
.cmp .cols{display:flex;gap:10px}
.cmp .col{flex:1;background:var(--bg);border-radius:10px;padding:8px 10px}
.cmp .col small{color:var(--muted);font-size:11px;display:block}
.cmp .col b{font-size:18px}
.cmp .col.red b{color:var(--red)}
.cmp .col.amber b{color:var(--amber)}

.mv{display:flex;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
.mv .tg{font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px}
.mv .tg.entrada{background:var(--ok-bg);color:var(--ok)}
.mv .tg.saida{background:var(--red-bg);color:var(--red)}
.mv .tg.ajuste{background:var(--amber-bg);color:var(--amber)}
.mv .tg.transferencia{background:#E4F1FB;color:var(--primary-d)}
.mv .d{flex:1}.mv .d b{font-size:14px}.mv .d small{color:var(--muted);font-size:12px;display:block}

.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:14px;z-index:60;box-shadow:var(--shadow);animation:rise .2s ease both}

@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.spin{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--primary);border-radius:50%;animation:sp .8s linear infinite;margin:40px auto}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login">
  <div class="brand">
    <img class="logo" src="logo.png" alt="Dentalsaúde">
    <p>Gestão de Stock</p>
  </div>
  <div class="profiles" id="profiles"></div>
  <div class="pin hidden" id="pinBox">
    <input id="pinInput" type="tel" inputmode="numeric" maxlength="8" placeholder="• • • •" autocomplete="off">
    <div class="row">
      <button class="back" onclick="cancelPin()">Voltar</button>
      <button class="ok" onclick="submitPin()">Entrar</button>
    </div>
    <div class="err" id="pinErr"></div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app" class="hidden">
  <header class="top">
    <div class="iconbtn" onclick="logout()" title="Trocar perfil">↩</div>
    <div class="title">
      <b>Stock</b>
      <small id="clinicaLabel"></small>
    </div>
    <div class="iconbtn" onclick="openCompras()" title="Lista de compras">🛒</div>
    <div class="iconbtn" onclick="openFatura()" title="Ler fatura (IA)">📄</div>
    <div class="iconbtn" onclick="openMenu()" title="Ferramentas">☰</div>
    <div id="adminSwitch" class="cl-switch hidden">
      <button data-cl="Paredes" onclick="setClinica('Paredes')">Paredes</button>
      <button data-cl="Póvoa de Lanhoso" onclick="setClinica('Póvoa de Lanhoso')">Póvoa</button>
      <button data-cl="__cmp" onclick="setClinica('__cmp')">⇄</button>
    </div>
  </header>

  <div class="toolbar">
    <div class="search"><input id="q" placeholder="Procurar produto…" oninput="render()"></div>
    <div class="chips" id="chips"></div>
  </div>

  <main id="main"><div class="spin"></div></main>

  <div class="fabwrap">
    <button class="fab scan" onclick="openScan()" title="Ler código de barras">📷</button>
    <button class="fab" onclick="openAdd()">＋ Produto</button>
  </div>
</div>

<script>
/* ============================================================
   ⚙️  CONFIGURAÇÃO — preenche estes 3 valores
   ============================================================ */
const CONFIG = {
  // 1) URL do teu projeto Supabase (confirma — é o que usas nas outras apps)
  SUPABASE_URL: "https://dcoeclhvtpwefdvbhfzh.supabase.co",

  // 2) A tua anon key (Supabase → Settings → API → Project API keys → anon public)
  SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjb2VjbGh2dHB3ZWZkdmJoZnpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0ODc4ODMsImV4cCI6MjA5NjA2Mzg4M30.BbuJlVU4PNXxjHjM6Tjq8S1AsI3rPreTQ1EvoAuMcgk",

  // 3) PINs de acesso (muda-os!)
  PINS: {
    "Paredes":          "2222",
    "Póvoa de Lanhoso": "1111",
    "Administrador":    "2091"
  }
};
/* ============================================================ */

const CLINICAS = ["Paredes", "Póvoa de Lanhoso"];
const sb = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
const FN_FATURA = (CONFIG.SUPABASE_URL||'').replace(/\/$/,'') + "/functions/v1/ler-fatura";

let state = {
  perfil: null,        // "Paredes" | "Póvoa de Lanhoso" | "Administrador"
  clinica: null,       // clínica ativa na vista; "__cmp" = comparativo (só admin)
  cat: "Todas",
  stock: [],           // linhas stk_stock (com produto embebido) da clínica ativa
  cmp: [],             // dados comparativos (admin)
};

/* ---------- LOGIN ---------- */
function buildProfiles(){
  const wrap = document.getElementById('profiles');
  const defs = [
    ["Paredes","Acesso à clínica de Paredes","P"],
    ["Póvoa de Lanhoso","Acesso à clínica da Póvoa","PL"],
    ["Administrador","Vê as duas clínicas + gestão","A"],
  ];
  wrap.innerHTML = defs.map(([nome,desc,ini])=>`
    <button class="pcard" onclick="askPin('${nome}')">
      <span class="dot">${ini}</span>
      <span><b>${nome}</b><small>${desc}</small></span>
    </button>`).join('');
}
let pendingProfile=null;
function askPin(nome){
  pendingProfile=nome;
  document.getElementById('profiles').classList.add('hidden');
  document.getElementById('pinBox').classList.remove('hidden');
  const i=document.getElementById('pinInput'); i.value=''; i.focus();
  document.getElementById('pinErr').textContent='';
}
function cancelPin(){
  pendingProfile=null;
  document.getElementById('pinBox').classList.add('hidden');
  document.getElementById('profiles').classList.remove('hidden');
}
function submitPin(){
  const v=document.getElementById('pinInput').value.trim();
  if(v===CONFIG.PINS[pendingProfile]){
    localStorage.setItem('stk_perfil', pendingProfile);
    enter(pendingProfile);
  }else{
    document.getElementById('pinErr').textContent='PIN incorreto.';
    document.getElementById('pinInput').value='';
  }
}
document.addEventListener('keydown',e=>{ if(e.key==='Enter' && !document.getElementById('pinBox').classList.contains('hidden')) submitPin(); });

function enter(perfil){
  state.perfil=perfil;
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  loadForns();
  const adminSw=document.getElementById('adminSwitch');
  if(perfil==='Administrador'){ adminSw.classList.remove('hidden'); setClinica('Paredes'); }
  else{ adminSw.classList.add('hidden'); setClinica(perfil); }
}
/* lista global de fornecedores (cresce com o uso) */
let FORNS=[];
function mergeForns(arr){
  (arr||[]).forEach(f=>{ String(f||'').split(/\s*[+\/]\s*/).forEach(x=>{ x=x.trim(); if(x && !FORNS.includes(x)) FORNS.push(x); }); });
  FORNS.sort((a,b)=>a.localeCompare(b,'pt'));
}
async function loadForns(){
  try{
    const a=await sb.from('stk_produtos').select('fornecedor');
    const b=await sb.from('stk_movimentos').select('fornecedor');
    mergeForns((a.data||[]).map(x=>x.fornecedor));
    mergeForns((b.data||[]).map(x=>x.fornecedor));
  }catch(e){}
}
function fornOptions(){ return FORNS.map(f=>`<option value="${esc(f)}">`).join(''); }
function logout(){
  localStorage.removeItem('stk_perfil');
  state={perfil:null,clinica:null,cat:"Todas",stock:[],cmp:[]};
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login').classList.remove('hidden');
  cancelPin();
}

/* ---------- DADOS ---------- */
async function setClinica(cl){
  state.clinica=cl; state.cat="Todas";
  document.querySelectorAll('#adminSwitch button').forEach(b=>b.classList.toggle('on', b.dataset.cl===cl));
  document.getElementById('clinicaLabel').textContent = cl==='__cmp' ? 'Comparativo das duas clínicas' : cl;
  document.querySelector('.fabwrap').style.display = cl==='__cmp' ? 'none' : 'flex';
  document.querySelector('.toolbar').style.display = cl==='__cmp' ? 'none' : 'flex';
  document.getElementById('main').innerHTML='<div class="spin"></div>';
  if(cl==='__cmp'){ await loadCmp(); renderCmp(); }
  else{ await loadStock(); render(); }
}
async function loadStock(){
  const {data,error}=await sb.from('stk_stock')
    .select('id,quantidade,limiar_critico,limiar_rutura,validade,clinica,produto:stk_produtos(id,nome,alcunha,categoria,unidade,referencia,fornecedor,codigo_barras,ativo)')
    .eq('clinica',state.clinica);
  if(error){ toast('Erro ao carregar: '+error.message); state.stock=[]; return; }
  state.stock=(data||[]).filter(r=>r.produto && r.produto.ativo!==false)
    .sort((a,b)=>dispName(a.produto).localeCompare(dispName(b.produto),'pt'));
  mergeForns(state.stock.map(s=>s.produto&&s.produto.fornecedor));
}
async function loadCmp(){
  const {data,error}=await sb.from('stk_stock')
    .select('quantidade,limiar_critico,limiar_rutura,validade,clinica,produto:stk_produtos(id,nome,alcunha,categoria,ativo)');
  if(error){ toast('Erro: '+error.message); state.cmp=[]; return; }
  const map={};
  (data||[]).filter(r=>r.produto&&r.produto.ativo!==false).forEach(r=>{
    const id=r.produto.id;
    map[id]=map[id]||{nome:r.produto.nome,alcunha:r.produto.alcunha,categoria:r.produto.categoria,cl:{}};
    map[id].cl[r.clinica]={q:r.quantidade,crit:r.limiar_critico,rut:r.limiar_rutura,val:r.validade};
  });
  state.cmp=Object.values(map).sort((a,b)=>a.nome.localeCompare(b.nome,'pt'));
}

/* ---------- ESTADO DE STOCK ---------- */
function statusOf(q,crit,rut){
  q=+q||0; crit=+crit||0; rut=+rut||0;
  if(rut>0 && q<=rut) return {cls:'red',txt:'Em rutura'};
  if(crit>0 && q<=crit) return {cls:'amber',txt:'Crítico'};
  return {cls:'ok',txt:'OK'};
}
function fmtDate(v){ if(!v) return ''; const p=String(v).slice(0,10).split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0].slice(2)}`:v; }
function validadeInfo(v){
  if(!v) return null;
  const d=new Date(String(v).slice(0,10)+'T00:00:00'); if(isNaN(d)) return null;
  const t=new Date(); t.setHours(0,0,0,0);
  const dias=Math.round((d-t)/86400000);
  if(dias<0) return {cls:'red',txt:'Validade expirada'};
  if(dias<=30) return {cls:'amber',txt:'Validade '+dias+'d'};
  return {cls:'ok',txt:''};
}

/* ---------- RENDER LISTA ---------- */
function categories(){
  const s=new Set(); state.stock.forEach(r=>{ if(r.produto.categoria) s.add(r.produto.categoria); });
  return ['Todas',...[...s].sort((a,b)=>a.localeCompare(b,'pt'))];
}
function render(){
  if(state.clinica==='__cmp') return;
  // chips
  const chips=document.getElementById('chips');
  chips.innerHTML=categories().map(c=>`<button class="chip ${c===state.cat?'on':''}" onclick="state.cat='${c.replace(/'/g,"\\'")}';render()">${c}</button>`).join('');
  // filtro
  const q=document.getElementById('q').value.toLowerCase().trim();
  let rows=state.stock.filter(r=>{
    if(state.cat!=='Todas' && r.produto.categoria!==state.cat) return false;
    if(q && !((r.produto.nome||'').toLowerCase().includes(q) || (r.produto.alcunha||'').toLowerCase().includes(q) || (r.produto.categoria||'').toLowerCase().includes(q))) return false;
    return true;
  });
  const alerts=state.stock.filter(r=>statusOf(r.quantidade,r.limiar_critico,r.limiar_rutura).cls==='red').length;
  let html=`<div class="summary">
     <div class="stat"><b>${state.stock.length}</b><small>produtos</small></div>
     <div class="stat ${alerts?'alert':''}"><b>${alerts}</b><small>em rutura</small></div>
   </div>`;
  if(!rows.length){
    html+=`<div class="empty"><div class="big">📦</div>${state.stock.length?'Nada encontrado.':'Ainda sem produtos. Toca em <b>＋ Produto</b>.'}</div>`;
  }else{
    html+=rows.map(r=>{
      const st=statusOf(r.quantidade,r.limiar_critico,r.limiar_rutura);
      const vi=validadeInfo(r.validade);
      const p=r.produto;
      const main=esc(dispName(p));
      const sub=esc(p.alcunha ? p.nome : (p.categoria||'Sem categoria'));
      return `<div class="item" onclick='openMove(${JSON.stringify(r.id)})'>
        <div class="qty"><b>${fmt(r.quantidade)}</b><small>${esc(p.unidade||'un')}</small></div>
        <div class="info">
          <b>${main}</b>
          <small>${sub}${r.validade?' · val. '+fmtDate(r.validade):''}</small><br>
          <span class="badge ${st.cls}">${st.txt}</span>${vi&&vi.cls!=='ok'?` <span class="badge ${vi.cls}">${vi.txt}</span>`:''}
        </div>
        <div class="step" onclick="event.stopPropagation()">
          <button class="plus"  onclick='quick(${JSON.stringify(r.id)},1)'>＋</button>
          <button class="minus" onclick='quick(${JSON.stringify(r.id)},-1)'>－</button>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('main').innerHTML=html;
}
function renderCmp(){
  let html='';
  if(!state.cmp.length){ html=`<div class="empty"><div class="big">📦</div>Ainda sem produtos.</div>`; }

async function loadMovs(pid){
  const el=document.getElementById('movList'); if(!el) return;
  const {data,error}=await sb.from('stk_movimentos')
    .select('tipo,quantidade,nota,perfil,preco,criado_em')
    .eq('produto_id',pid).eq('clinica',state.clinica)
    .order('criado_em',{ascending:false}).limit(20);
  if(error){ el.innerHTML='<small style="color:var(--muted)">Não foi possível carregar.</small>'; return; }
  if(!data||!data.length){ el.innerHTML='<small style="color:var(--muted)">Sem movimentos registados ainda.</small>'; return; }
  el.innerHTML=data.map(m=>{
    const sgn=m.tipo==='saida'?'−':m.tipo==='entrada'?'+':m.tipo==='ajuste'?'=':'⇄';
    const lbl=m.tipo==='ajuste'?'Ajuste':m.tipo==='entrada'?'Entrada':m.tipo==='saida'?'Saída':'Transfer.';
    const pr=(m.tipo==='entrada'&&m.preco!=null)?' · €'+(+m.preco).toFixed(2)+'/un':'';
    return `<div class="mv"><span class="tg ${m.tipo}">${lbl}</span>

let mvTipo='entrada';
function segSel(t){ mvTipo=t;
  document.getElementById('sgE').className=t==='entrada'?'on plus':'plus';
  document.getElementById('sgS').className=t==='saida'?'on minus':'minus';
  document.getElementById('sgA').className=t==='ajuste'?'on adj':'adj';
  const pf=document.getElementById('entradaExtras'); if(pf) pf.style.display=t==='entrada'?'block':'none';
  document.querySelector('#mvOk').textContent = t==='ajuste'?'Definir total':'Registar';
}
function nudge(d){ const i=document.getElementById('mvQ'); i.value=Math.max(0,(+i.value||0)+d); }
async function confirmMove(id){
  const r=state.stock.find(x=>x.id===id); if(!r) return;
  const qtd=+document.getElementById('mvQ').value||0;
  const nota=document.getElementById('mvNota').value.trim();
  const preco = mvTipo==='entrada' ? (parseFloat(document.getElementById('mvPreco').value)||null) : null;
  const forn = mvTipo==='entrada' ? (document.getElementById('mvForn').value.trim()||null) : null;
  if(qtd<=0 && mvTipo!=='ajuste'){ toast('Indica uma quantidade.'); return; }
  let novo;
  if(mvTipo==='entrada') novo=(+r.quantidade||0)+qtd;
  else if(mvTipo==='saida') novo=Math.max(0,(+r.quantidade||0)-qtd);
  else novo=qtd; // ajuste = total
  await applyMove(r,novo,mvTipo,mvTipo==='ajuste'?novo:qtd,nota,preco,forn);
  closeSheet();
}
async function applyMove(r,novo,tipo,qtd,nota,preco,forn){
  if(forn) mergeForns([forn]);
  const {error}=await sb.from('stk_stock').update({quantidade:novo}).eq('id',r.id);
  if(error){ toast('Erro: '+error.message); return; }
  r.quantidade=novo;
  sb.from('stk_movimentos').insert({
    produto_id:r.produto.id, clinica:state.clinica, tipo, quantidade:qtd,
    nota:nota||null, perfil:state.perfil, preco:preco||null, fornecedor:forn||null
  }).then(()=>{});
  render();
  toast(tipo==='entrada'?'＋ Entrada registada':tipo==='saida'?'－ Saída registada':'Stock ajustado');
}
async function saveStockCfg(id){
  const r=state.stock.find(x=>x.id===id); if(!r) return;
  const crit=+document.getElementById('mvCrit').value||0;
  const rut=+document.getElementById('mvRut').value||0;
  const val=document.getElementById('mvVal').value||null;
  const {error}=await sb.from('stk_stock').update({limiar_critico:crit,limiar_rutura:rut,validade:val}).eq('id',r.id);
  if(error){ toast('Erro: '+error.message); return; }
  r.limiar_critico=crit; r.limiar_rutura=rut; r.validade=val;
  render(); toast('Alertas/validade atualizados'); closeSheet();
}

function checkDup(){
  const v=document.getElementById('pNome').value.trim().toLowerCase();
  const h=document.getElementById('dupHint');
  const hit=allProducts.find(p=>p.nome.toLowerCase()===v || (p.alcunha||'').toLowerCase()===v);
  const sim=allProducts.filter(p=>v.length>=3 && (p.nome.toLowerCase().includes(v) || (p.alcunha||'').toLowerCase().includes(v)));
  if(hit){ h.textContent='⚠ Já existe este produto no catálogo — evita duplicar.'; h.classList.remove('hidden'); }
  else if(sim.length){ h.textContent='Parecidos: '+sim.slice(0,3).map(p=>p.nome).join(', '); h.classList.remove('hidden'); }
  else h.classList.add('hidden');

async function gerarRelatorio(){
  if(typeof XLSX==='undefined'){ toast('A biblioteca de Excel ainda está a carregar — tenta daqui a pouco.'); return; }
  const de=document.getElementById('rDe').value, ate=document.getElementById('rAte').value;
  if(!de||!ate){ toast('Indica as duas datas.'); return; }
  const clSel=document.getElementById('rCl').value;
  const btn=document.getElementById('rGo'); btn.textContent='A gerar…';
  let mq=sb.from('stk_movimentos').select('produto_id,clinica,tipo,quantidade,nota,perfil,preco,fornecedor,criado_em')
        .gte('criado_em',de+'T00:00:00').lte('criado_em',ate+'T23:59:59').order('criado_em',{ascending:true});
  if(clSel!=='Ambas') mq=mq.eq('clinica',clSel);
  const {data:movs,error:e1}=await mq;
  const {data:prods}=await sb.from('stk_produtos').select('id,nome,alcunha,categoria,unidade,referencia,fornecedor');
  let sq=sb.from('stk_stock').select('clinica,quantidade,limiar_critico,limiar_rutura,validade,produto:stk_produtos(id,nome,alcunha,categoria,unidade,referencia,fornecedor,ativo)');
  if(clSel!=='Ambas') sq=sq.eq('clinica',clSel);
  const {data:stock}=await sq;
  if(e1){ toast('Erro: '+e1.message); btn.textContent='Gerar Excel'; return; }
  const pmap={}; (prods||[]).forEach(p=>pmap[p.id]=p);
  const z=n=>String(n).padStart(2,'0');
  const dstr=v=>{const d=new Date(v);return `${z(d.getDate())}/${z(d.getMonth()+1)}/${d.getFullYear()}`;};
  const f1=[['Data','Hora','Clínica','Produto','Categoria','Tipo','Quantidade','Preço unit. (€)','Total (€)','Fornecedor','Perfil','Nota']];
  (movs||[]).forEach(m=>{ const p=pmap[m.produto_id]||{}; const d=new Date(m.criado_em);
    const tot=(m.tipo==='entrada'&&m.preco!=null)?+(((+m.preco)*(+m.quantidade||0)).toFixed(2)):'';
    let qd=+m.quantidade||0; if(m.tipo==='saida') qd=-qd; else if(m.tipo==='transferencia') qd=(m.nota||'').includes('→')?-qd:qd;
    f1.push([dstr(m.criado_em),`${z(d.getHours())}:${z(d.getMinutes())}`,m.clinica,p.alcunha||p.nome||'',p.categoria||'',m.tipo,qd,(m.preco!=null?+m.preco:''),tot,m.fornecedor||p.fornecedor||'',m.perfil||'',m.nota||'']); });
  const f4=[['Data','Produto','Categoria','Fornecedor','Clínica','Quantidade','Preço unit. (€)','Total (€)']];
  (movs||[]).filter(m=>m.tipo==='entrada'&&m.preco!=null).forEach(m=>{ const p=pmap[m.produto_id]||{};
    f4.push([dstr(m.criado_em),p.alcunha||p.nome||'',p.categoria||'',m.fornecedor||p.fornecedor||'',m.clinica,+m.quantidade||0,+m.preco,+(((+m.preco)*(+m.quantidade||0)).toFixed(2))]); });
  const agg={};
  (movs||[]).forEach(m=>{ const p=pmap[m.produto_id]||{}; const k=(p.alcunha||p.nome||m.produto_id)+'|'+m.clinica;
    agg[k]=agg[k]||{prod:p.alcunha||p.nome||'',cat:p.categoria||'',cl:m.clinica,sai:0,ent:0};
    if(m.tipo==='saida') agg[k].sai+=(+m.quantidade||0); else if(m.tipo==='entrada') agg[k].ent+=(+m.quantidade||0); });
  const f3=[['Produto','Categoria','Clínica','Total saídas','Total entradas']];
  Object.values(agg).sort((a,b)=>b.sai-a.sai).forEach(a=>f3.push([a.prod,a.cat,a.cl,a.sai,a.ent]));
  const f2=[['Clínica','Produto','Nome oficial','Categoria','Unidade','Quantidade','Crítico','Rutura','Estado','Validade','Referência','Fornecedor']];
  (stock||[]).filter(s=>s.produto&&s.produto.ativo!==false)
    .sort((a,b)=>(a.clinica+dispName(a.produto)).localeCompare(b.clinica+dispName(b.produto),'pt'))
    .forEach(s=>{ const p=s.produto; const st=statusOf(s.quantidade,s.limiar_critico,s.limiar_rutura);
      f2.push([s.clinica,p.alcunha||p.nome,p.nome,p.categoria||'',p.unidade||'',+s.quantidade||0,+s.limiar_critico||0,+s.limiar_rutura||0,st.txt,s.validade?fmtDate(s.validade):'',p.referencia||'',p.fornecedor||'']); });
  const {data:allEnt}=await sb.from('stk_movimentos').select('produto_id,preco,criado_em').eq('tipo','entrada').order('criado_em',{ascending:true});
  const lastP={}; (allEnt||[]).forEach(m=>{ if(m.preco!=null) lastP[m.produto_id]=+m.preco; });
  const f5=[['Clínica','Produto','Categoria','Quantidade','Último preço (€)','Valor (€)']];
  (stock||[]).filter(s=>s.produto&&s.produto.ativo!==false)
    .sort((a,b)=>(a.clinica+dispName(a.produto)).localeCompare(b.clinica+dispName(b.produto),'pt'))
    .forEach(s=>{ const p=s.produto; const pr=lastP[p.id];
      f5.push([s.clinica,p.alcunha||p.nome,p.categoria||'',+s.quantidade||0,(pr!=null?pr:''),(pr!=null?+((pr*(+s.quantidade||0)).toFixed(2)):'')]); });
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(f1),'Movimentos');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(f4),'Compras');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(f3),'Consumos');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(f5),'Valorização');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(f2),'Stock atual');
  XLSX.writeFile(wb,`relatorio_stock_${de}_a_${ate}.xlsx`);
  btn.textContent='Gerar Excel'; closeSheet(); toast('Relatório gerado');
}

let fxLines=[];
async function openFatura(){
  if(state.clinica==='__cmp'){ toast('Escolhe uma clínica primeiro.'); return; }
  await loadCatalog();
  fxLines=[];
  const demo = !!window.__SAMPLE_FATURA__;
  sheet(`
    <h2>Ler fatura</h2>
    <div class="sub">Carrega o PDF do email ou tira foto da fatura em papel. A IA lê as linhas — tu confirmas tudo antes de entrar no stock de <b>${esc(state.clinica)}</b>.</div>
    <input id="fxFile" type="file" accept="application/pdf,image/*" style="display:none" onchange="fxRead(this)">
    <button class="btn primary" style="width:100%" onclick="${demo?'fxRead(null)':"document.getElementById('fxFile').click()"}">${demo?'📄 Demonstrar com a fatura Dentalexpress':'📄 Escolher PDF / tirar foto'}</button>
    <div id="fxBody" style="margin-top:14px"></div>
  `);
}
function fileToB64(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(String(r.result).split(',')[1]); r.onerror=()=>rej(r.error||new Error('Falha a ler o ficheiro')); r.readAsDataURL(file); }); }
async function fxRead(input){
  const file=input&&input.files?input.files[0]:null;
  const body=document.getElementById('fxBody');
  body.innerHTML='<div class="spin" style="margin:22px auto"></div><div class="sub" style="text-align:center">A ler a fatura… pode demorar uns segundos.</div>';
  try{
    let lines;
    if(window.__SAMPLE_FATURA__){ await new Promise(r=>setTimeout(r,900)); lines=window.__SAMPLE_FATURA__(); }
    else{
      if(!file){ openFatura(); return; }
      const b64=await fileToB64(file);
      const resp=await fetch(FN_FATURA,{method:'POST',headers:{'Content-Type':'application/json','apikey':CONFIG.SUPABASE_ANON_KEY,'Authorization':'Bearer '+CONFIG.SUPABASE_ANON_KEY},body:JSON.stringify({fileBase64:b64,mediaType:file.type||'application/pdf'})});
      const data=await resp.json().catch(()=>({}));
      if(!resp.ok || data.error){ throw new Error(data.error||('servidor '+resp.status)); }
      lines=data.linhas||data.items||[];
    }
    if(!lines.length){ body.innerHTML='<div class="sub">Não encontrei linhas de artigos nesta fatura. Tenta outra foto/ficheiro.</div><button class="btn ghost" style="width:100%;margin-top:8px" onclick="openFatura()">↺ Tentar outra vez</button>'; return; }
    fxLines=lines.map(fxMatch);
    fxRenderReview();
  }catch(e){
    body.innerHTML='<div class="sub" style="color:var(--red)">Não consegui ler a fatura: '+esc(e.message)+'</div><button class="btn ghost" style="width:100%;margin-top:8px" onclick="openFatura()">↺ Tentar outra vez</button>';
  }
}
function normRef(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9]/g,''); }
function fxMatch(l){
  const ref=l.referencia||l.ref||''; const nr=normRef(ref);
  let prod=null;
  if(nr) prod=allProducts.find(p=>(p.referencia||'').split(/[\/,;+]/).some(x=>normRef(x)&&normRef(x)===nr));
  if(!prod && l.descricao){ const d=String(l.descricao).toLowerCase();
    prod=allProducts.find(p=>p.nome && (d.includes(p.nome.toLowerCase()) || p.nome.toLowerCase().includes(d.slice(0,12)))); }
  return { ref, descricao:l.descricao||l.desc||'', qtd:+(l.quantidade||l.qtd||l.unds||0)||0,
    preco:+(l.preco_unitario||l.preco||l.neto||0)||0, produto_id:prod?prod.id:null, criar:false, alcunha:'', incluir:!!prod };
}
function fxRenderReview(){
  const body=document.getElementById('fxBody');
  const cols='display:grid;grid-template-columns:1fr 46px 60px 26px;gap:6px;align-items:center';
  const matched=fxLines.filter(l=>l.produto_id).length;
  const rows=fxLines.map((l,i)=>{
    const prod=l.produto_id?allProducts.find(p=>p.id===l.produto_id):null;
    const pv=prod?esc(dispName(prod)):'';
    const badge = l.produto_id ? '<span style="color:var(--ok)">✓ no catálogo</span>'
                : (l.criar ? '<span style="color:var(--primary)">✚ produto novo</span>'
                : '<span style="color:var(--red)">— escreve para associar/criar</span>');
    const warn=l.produto_id?'':(l.criar?'border-color:var(--primary)':'border-color:var(--red);background:var(--red-bg)');
    return `<div class="fxrow" data-i="${i}" style="padding:9px 0;border-bottom:1px solid var(--line)">
      <div style="font-size:11.5px;color:var(--muted);margin-bottom:5px;line-height:1.3">${esc(l.descricao)} · <b style="color:var(--ink)">${esc(l.ref)}</b> <span id="fxst${i}" style="font-weight:600">${badge}</span></div>
      <div style="${cols}">
        <input id="fxp${i}" list="fxProds" value="${pv}" placeholder="— escolher ou escrever novo —" oninput="fxSetProd(${i},this.value)" style="font-size:12.5px;padding:8px 9px;border-radius:9px;border:1px solid var(--line);${warn}">
        <input type="number" inputmode="numeric" value="${l.qtd}" onchange="fxLines[${i}].qtd=+this.value||0" style="text-align:center;font-size:13px;padding:8px 2px;border-radius:9px;border:1px solid var(--line)">
        <input type="number" step="0.01" inputmode="decimal" value="${l.preco}" onchange="fxLines[${i}].preco=+this.value||0" style="text-align:center;font-size:13px;padding:8px 2px;border-radius:9px;border:1px solid var(--line)">
        <button onclick="fxDrop(${i},this)" style="background:none;border:none;color:var(--muted);font-size:17px" title="Ignorar linha">✕</button>
      </div></div>`;
  }).join('');
  body.innerHTML=`
    <div class="sub" style="margin:0 0 10px">${matched} de ${fxLines.length} linhas associadas automaticamente. Nas que faltam, escolhe um produto ou <b>escreve um nome novo</b> para o criar (fica com a referência e o fornecedor da fatura). Confirma quantidade e preço (líquido/unidade).</div>
    <div style="${cols};font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;padding-bottom:4px"><div>Produto · ref. da fatura</div><div style="text-align:center">Qt</div><div style="text-align:center">€/un</div><div></div></div>
    <div style="max-height:44vh;overflow:auto;-webkit-overflow-scrolling:touch">${rows}</div>
    <datalist id="fxProds">${allProducts.map(p=>`<option value="${esc(dispName(p))}">`).join('')}</datalist>
    <div class="field" style="margin-top:14px"><label>Fornecedor desta fatura</label>
      <input id="fxForn" list="dlFxForn" value="Dentalexpress" autocomplete="off">
      <datalist id="dlFxForn">${fornOptions()}</datalist></div>
    <div class="btnrow">
      <button class="btn ghost" onclick="closeSheet()">Cancelar</button>
      <button class="btn primary" onclick="fxCommit()">✓ Registar em ${esc(state.clinica)}</button>
    </div>`;
}
function fxMarkRow(i){
  const l=fxLines[i]; const inp=document.getElementById('fxp'+i); const st=document.getElementById('fxst'+i);
  let txt,col,border='var(--line)',bg='#fff';
  if(l.produto_id){ txt='✓ no catálogo'; col='var(--ok)'; }
  else if(l.criar){ txt='✚ produto novo'; col='var(--primary)'; border='var(--primary)'; }
  else if(!l.incluir){ txt='— ignorada'; col='var(--muted)'; }
  else { txt='— escreve para associar/criar'; col='var(--red)'; border='var(--red)'; bg='var(--red-bg)'; }
  if(st) st.innerHTML='<span style="color:'+col+'">'+txt+'</span>';
  if(inp){ inp.style.borderColor=border; inp.style.background=bg; }
}
function fxSetProd(i,val){
  const v=(val||'').trim(); const lv=v.toLowerCase();
  if(!v){ fxLines[i].produto_id=null; fxLines[i].criar=false; fxLines[i].incluir=false; fxMarkRow(i); return; }
  const p=allProducts.find(x=>dispName(x).toLowerCase()===lv)||allProducts.find(x=>(x.nome||'').toLowerCase()===lv);
  if(p){ fxLines[i].produto_id=p.id; fxLines[i].criar=false; fxLines[i].alcunha=''; fxLines[i].incluir=true; }
  else { fxLines[i].produto_id=null; fxLines[i].criar=true; fxLines[i].alcunha=v; fxLines[i].incluir=true; }
  fxMarkRow(i);
}
function fxDrop(i,btn){ fxLines[i].incluir=false; fxLines[i].produto_id=null; fxLines[i].criar=false;
  const inp=document.getElementById('fxp'+i); if(inp) inp.value=''; const row=btn.closest('.fxrow'); if(row) row.style.opacity=.45; fxMarkRow(i); }
async function fxCommit(){
  const forn=(document.getElementById('fxForn').value||'').trim()||null;
  if(forn) mergeForns([forn]);
  const sel=fxLines.filter(l=>l.incluir && l.qtd>0 && (l.produto_id || (l.criar && l.alcunha)));
  if(!sel.length){ toast('Nada para registar — associa ou cria pelo menos um produto'); return; }
  let ok=0, novos=0, aprendidas=0;
  for(const l of sel){
    let pid=l.produto_id;
    if(!pid && l.criar){
      const insP=await sb.from('stk_produtos').insert({nome:l.descricao||l.alcunha, alcunha:l.alcunha||null, referencia:l.ref||null, fornecedor:forn, ativo:true}).select('id').single();
      if(insP.error || !insP.data){ continue; }
      pid=insP.data.id; novos++;
      for(const cl of CLINICAS){ await sb.from('stk_stock').insert({produto_id:pid,clinica:cl,quantidade: cl===state.clinica? l.qtd : 0}); }
      allProducts.push({id:pid,nome:l.descricao||l.alcunha,alcunha:l.alcunha,referencia:l.ref,fornecedor:forn});
    } else {
      let r=state.stock.find(x=>x.produto && x.produto.id===pid);
      if(r){ const novo=(+r.quantidade||0)+l.qtd; const {error}=await sb.from('stk_stock').update({quantidade:novo}).eq('id',r.id); if(error) continue; r.quantidade=novo; }
      else { const insS=await sb.from('stk_stock').insert({produto_id:pid,clinica:state.clinica,quantidade:l.qtd}).select('id').single(); if(insS.error) continue; }
      // aprender a referência desta fatura, se for nova para o produto
      if(l.ref){
        const prod=allProducts.find(p=>p.id===pid);
        const have=(prod&&prod.referencia||'').split(/[\/,;+]/).map(s=>normRef(s)).filter(Boolean);
        if(prod && !have.includes(normRef(l.ref))){
          const novaRef=(prod.referencia?prod.referencia+' / ':'')+l.ref;
          const {error}=await sb.from('stk_produtos').update({referencia:novaRef}).eq('id',pid);
          if(!error){ prod.referencia=novaRef; if(r&&r.produto) r.produto.referencia=novaRef; aprendidas++; }
        }
      }
    }
    await sb.from('stk_movimentos').insert({produto_id:pid,clinica:state.clinica,tipo:'entrada',quantidade:l.qtd,nota:l.criar?'fatura (novo)':'fatura',perfil:state.perfil,preco:l.preco||null,fornecedor:forn});
    ok++;
  }
  closeSheet(); await loadStock(); render();
  toast('✓ '+ok+(ok===1?' entrada':' entradas')+(novos?(' · '+novos+(novos===1?' novo':' novos')):'')+(aprendidas?(' · '+aprendidas+' ref. aprendida'+(aprendidas>1?'s':'')):''));
}

    Object.keys(groups).sort((a,b)=>a.localeCompare(b,'pt')).forEach(forn=>{

      });
      html+='</div>';
    });
  } else {
    html+='<div class="sub" style="margin:2px 0 8px">Nada abaixo dos limiares. 👍</div>';
  }

  // --- Outros a comprar (à mão) ---
  html+=`<div class="cprov"><h3>Outros a comprar</h3>`;

  else html+=`<div class="sub" style="margin:2px 0 6px">Acrescenta aqui o que precisas de encomendar e não está no stock acima.</div>`;
  html+=desejoAdd('compra','ex: sacos do lixo 50L, toalhetes…')+`</div>`;

  html+=`<div class="btnrow"><button class="btn ghost" onclick="copiarTexto()">Copiar</button><button class="btn primary" onclick="partilharTexto()">Partilhar</button></div>`;

  // --- Lista de desejos ---
  html+=`<div class="cprov" style="margin-top:14px"><h3>💡 Lista de desejos</h3>
    <div class="sub" style="margin:2px 0 6px">Produtos ou ideias que ainda não estão no catálogo, para comprar um dia.</div>`;
  if(desejos.length){ desejos.forEach(d=>{ html+=desejoRow(d); }); }
  html+=desejoAdd('desejo','ex: scanner intraoral, nova cadeira…')+`</div>`;

  window._shareTxt=txt;
  document.getElementById('cSub').textContent = low.length?`${low.length} produto(s) abaixo do limiar`:'';
  body.innerHTML=html;
}
function desejoRow(d){
  return `<div class="ci"><b>${esc(d.texto)}${(d.clinica&&d.clinica!=='Ambas'&&state.clinica==='__cmp')?' <small style="color:var(--muted);font-weight:400">· '+esc(d.clinica)+'</small>':''}</b>`
    +`<button onclick='delDesejo(${JSON.stringify(d.id)})' style="background:none;border:none;color:var(--muted);font-size:16px" title="Remover">✕</button></div>`;
}
function desejoAdd(tipo,ph){
  const id = tipo==='desejo'?'inpDesejo':'inpCompra';
  return `<div style="display:flex;gap:8px;margin-top:8px">
    <input id="${id}" placeholder="${esc(ph)}" autocomplete="off" style="flex:1;padding:10px 11px;border:1px solid var(--line);border-radius:10px"
      onkeydown="if(event.key==='Enter')addDesejo('${tipo}')">
    <button class="btn primary sm" onclick="addDesejo('${tipo}')">Adicionar</button></div>`;
}
async function addDesejo(tipo){
  const el=document.getElementById(tipo==='desejo'?'inpDesejo':'inpCompra');
  const t=(el&&el.value||'').trim();
  if(!t){ toast('Escreve o que falta.'); return; }
  const clinicaAdd = state.clinica==='__cmp'?'Ambas':state.clinica;
  const {error}=await sb.from('stk_desejos').insert({texto:t,tipo,clinica:clinicaAdd,perfil:state.perfil});
  if(error){ toast('Falta criar a tabela dos desejos: '+error.message); return; }
  openCompras();
}
async function delDesejo(id){
  const {error}=await sb.from('stk_desejos').delete().eq('id',id);
  if(error){ toast('Erro: '+error.message); return; }
  openCompras();
}
function copiarTexto(){ const t=window._shareTxt||''; if(navigator.clipboard){ navigator.clipboard.writeText(t).then(()=>toast('Lista copiada')).catch(()=>toast('Não foi possível copiar')); } else toast('Cópia não suportada'); }
function partilharTexto(){ const t=window._shareTxt||''; if(navigator.share){ navigator.share({title:'Lista de compras',text:t}).catch(()=>{}); } else copiarTexto(); }

/* ---------- LEITURA DE CÓDIGO DE BARRAS ---------- */
function startReader(onResult){
  const rd=document.getElementById('reader'); if(!rd) return;
  if(typeof Html5Qrcode==='undefined'){ rd.innerHTML='<div style="color:#fff;padding:16px;text-align:center;font-size:13px">Leitor indisponível — escreve o código abaixo.</div>'; return; }
  try{ window._scanner=new Html5Qrcode('reader'); }catch(e){ return; }
  window._scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:240,height:150}},
    (txt)=>{ stopReader(); onResult(txt); }, ()=>{})
    .catch(()=>{ rd.innerHTML='<div style="color:#fff;padding:16px;text-align:center;font-size:13px">Câmara indisponível aqui. Na app publicada no telemóvel funciona. Escreve o código abaixo.</div>'; window._scanner=null; });
}
function stopReader(){ if(window._scanner){ const s=window._scanner; window._scanner=null; s.stop().then(()=>s.clear()).catch(()=>{}); } }
function openScan(){
  if(state.clinica==='__cmp'){ toast('Escolhe uma clínica primeiro.'); return; }
  sheet(`
    <h2>Ler código de barras</h2>
    <div class="sub">Aponta a câmara ao código do produto.</div>
    <div id="reader"></div>
    <div class="field"><label>Ou escreve o código</label>
      <div style="display:flex;gap:10px"><input id="scanManual" inputmode="numeric" placeholder="ex: 5601234567890"><button class="btn primary sm" onclick="onScan(document.getElementById('scanManual').value.trim())">Procurar</button></div>
    </div>
    <div class="btnrow"><button class="btn ghost" onclick="closeSheet()">Fechar</button></div>
  `);
  startReader(onScan);
}
async function onScan(code){
  if(!code) return; stopReader();
  const {data}=await sb.from('stk_produtos').select('id,nome,alcunha,codigo_barras').eq('codigo_barras',code).limit(1);
  if(data&&data.length){
    const r=state.stock.find(x=>x.produto&&x.produto.id===data[0].id);
    if(r){ closeSheet(); openMove(r.id); }
    else { closeSheet(); toast('Encontrado: '+(data[0].alcunha||data[0].nome)); }
  } else { linkBarcode(code); }
}
async function linkBarcode(code){
  await loadCatalog();
  sheet(`
    <h2>Código novo</h2>
    <div class="sub">O código <b>${esc(code)}</b> ainda não está associado. Liga-o a um produto existente ou cria um novo.</div>
    <div class="field"><label>Produto existente</label>
      <input id="lkProd" list="dlLk" placeholder="escreve para procurar…" autocomplete="off">
      <datalist id="dlLk">${allProducts.map(p=>`<option value="${esc(dispName(p))}">`).join('')}</datalist>
    </div>
    <div class="btnrow"><button class="btn ghost" onclick="closeSheet()">Cancelar</button>
      <button class="btn primary" onclick='associarCodigo(${JSON.stringify(code)})'>Associar</button></div>
    <div class="btnrow"><button class="btn ghost" onclick='novoComCodigo(${JSON.stringify(code)})'>Criar produto novo com este código</button></div>
  `);
}
async function associarCodigo(code){
  const v=document.getElementById('lkProd').value.trim().toLowerCase();
  const p=allProducts.find(x=>dispName(x).toLowerCase()===v)||allProducts.find(x=>(x.nome||'').toLowerCase()===v);
  if(!p){ toast('Escolhe um produto da lista.'); return; }
  const {error}=await sb.from('stk_produtos').update({codigo_barras:code}).eq('id',p.id);
  if(error){ toast('Erro: '+error.message); return; }
  closeSheet(); toast('Código associado a '+dispName(p)); await loadStock(); render();
}
function novoComCodigo(code){ closeSheet(); openAdd(code); }

/* ---------- TRANSFERÊNCIAS ENTRE CLÍNICAS ---------- */
function openTransfer(id){
  const r=state.stock.find(x=>x.id===id); if(!r) return;
  const outra = state.clinica==='Paredes'?'Póvoa de Lanhoso':'Paredes';
  sheet(`
    <h2>Transferir stock</h2>
    <div class="sub">${esc(dispName(r.produto))} · ${esc(state.clinica)} → ${esc(outra)}</div>
    <div class="sub">Disponível em ${esc(state.clinica)}: <b>${fmt(r.quantidade)} ${esc(r.produto.unidade||'')}</b></div>
    <div class="bignum">
      <button onclick="nudgeT(-1)">－</button>
      <input id="tQ" type="tel" inputmode="numeric" value="1">
      <button onclick="nudgeT(1)">＋</button>
    </div>
    <div class="btnrow"><button class="btn ghost" onclick='openMove(${JSON.stringify(id)})'>Voltar</button>
      <button class="btn primary" onclick='confirmTransfer(${JSON.stringify(id)},${JSON.stringify(outra)})'>Transferir</button></div>
  `);
}
function nudgeT(d){ const i=document.getElementById('tQ'); i.value=Math.max(1,(+i.value||0)+d); }
async function confirmTransfer(id,outra){
  const r=state.stock.find(x=>x.id===id); if(!r) return;
  const qtd=+document.getElementById('tQ').value||0;
  if(qtd<=0){ toast('Indica a quantidade.'); return; }
  if(qtd>(+r.quantidade||0)){ toast('Não há stock suficiente.'); return; }
  const {error:e1}=await sb.from('stk_stock').update({quantidade:(+r.quantidade||0)-qtd}).eq('id',r.id);
  if(e1){ toast('Erro: '+e1.message); return; }
  r.quantidade=(+r.quantidade||0)-qtd;
  const {data:rows}=await sb.from('stk_stock').select('id,quantidade').eq('produto_id',r.produto.id).eq('clinica',outra).limit(1);
  if(rows&&rows.length){ await sb.from('stk_stock').update({quantidade:(+rows[0].quantidade||0)+qtd}).eq('id',rows[0].id); }
  else { await sb.from('stk_stock').insert({produto_id:r.produto.id,clinica:outra,quantidade:qtd,limiar_critico:0,limiar_rutura:0}); }
  sb.from('stk_movimentos').insert([
    {produto_id:r.produto.id,clinica:state.clinica,tipo:'transferencia',quantidade:qtd,nota:'Transferência → '+outra,perfil:state.perfil},
    {produto_id:r.produto.id,clinica:outra,tipo:'transferencia',quantidade:qtd,nota:'Transferência ← '+state.clinica,perfil:state.perfil}
  ]).then(()=>{});
  closeSheet(); render(); toast('Transferido para '+outra);
}

/* ---------- VALORIZAÇÃO DO STOCK ---------- */
async function computeValorizacao(){
  const {data:movs}=await sb.from('stk_movimentos').select('produto_id,preco,criado_em').eq('tipo','entrada').order('criado_em',{ascending:true});
  const last={}; (movs||[]).forEach(m=>{ if(m.preco!=null) last[m.produto_id]=+m.preco; });
  const {data:stock}=await sb.from('stk_stock').select('clinica,quantidade,produto:stk_produtos(id,nome,alcunha,categoria,ativo)');
  return {last, rows:(stock||[]).filter(s=>s.produto&&s.produto.ativo!==false)};
}
async function openValorizacao(){
  sheet(`<h2>Valorização do stock</h2><div class="sub">A calcular…</div><div id="valBody"><div class="spin" style="margin:24px auto"></div></div>`);
  const {last,rows}=await computeValorizacao();
  const body=document.getElementById('valBody'); if(!body) return;
  const tot={}; let semPreco=0;
  rows.forEach(s=>{ const pr=last[s.produto.id]; if(pr!=null) tot[s.clinica]=(tot[s.clinica]||0)+pr*(+s.quantidade||0); else if((+s.quantidade||0)>0) semPreco++; });
  const eur=n=>'€'+(+n).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2});
  let html='';
  Object.keys(tot).sort().forEach(cl=>{ html+=`<div class="stat" style="margin-bottom:10px"><b>${eur(tot[cl])}</b><small>${esc(cl)}</small></div>`; });
  const total=Object.values(tot).reduce((a,b)=>a+b,0);
  html+=`<div class="stat" style="background:var(--ok-bg)"><b>${eur(total)}</b><small>Total (último preço conhecido)</small></div>`;
  if(semPreco) html+=`<div class="sub" style="margin-top:12px">${semPreco} produto(s) com stock mas sem preço registado — não entram no cálculo. Regista uma entrada com preço para os incluir.</div>`;
  html+=`<div class="btnrow"><button class="btn ghost" onclick="closeSheet()">Fechar</button><button class="btn primary" onclick="openReport()">Detalhe no Excel</button></div>`;
  body.innerHTML=html;
}

/* ---------- UI helpers ---------- */
function sheet(html){
  closeSheet();
  const bg=document.createElement('div'); bg.className='sheet-bg'; bg.id='sheetBg';
  bg.onclick=e=>{ if(e.target===bg) closeSheet(); };
  bg.innerHTML=`<div class="sheet">${html}</div>`;
  document.body.appendChild(bg);
}
function closeSheet(){ if(window._scanner){ try{stopReader();}catch(e){} } const e=document.getElementById('sheetBg'); if(e) e.remove(); }
function toast(t){ const e=document.createElement('div'); e.className='toast'; e.textContent=t; document.body.appendChild(e); setTimeout(()=>e.remove(),2200); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmt(n){ n=+n||0; return Number.isInteger(n)?n:(+n.toFixed(2)); }
function dispName(p){ if(!p) return ''; const a=(p.alcunha||'').split(',')[0].trim(); return a||p.nome||''; }
function fmtDateTime(v){ if(!v) return ''; const d=new Date(v); if(isNaN(d)) return ''; const z=n=>String(n).padStart(2,'0'); return `${z(d.getDate())}/${z(d.getMonth()+1)} ${z(d.getHours())}:${z(d.getMinutes())}`; }

/* ---------- ARRANQUE ---------- */
(function init(){
  if(CONFIG.SUPABASE_ANON_KEY.startsWith("COLOCA")){
    document.getElementById('profiles').innerHTML='<div style="background:rgba(255,255,255,.15);padding:14px;border-radius:12px;font-size:14px">⚙️ Falta preencher a <b>anon key</b> no bloco CONFIG do index.html.</div>';
  } else {
    buildProfiles();
  }
  const saved=localStorage.getItem('stk_perfil');
  if(saved && CONFIG.PINS[saved]) enter(saved);
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
})();
</script>
